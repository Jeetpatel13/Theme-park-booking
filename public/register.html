<!doctype html>
<html>
  <head>
    <title>Register</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <nav id="navbar"></nav>

    <div class="container">
      <h1 class="section-title">Create Your Account</h1>
      <div
        class="card"
        style="
          max-width: 600px;
          margin: auto;
          margin-bottom: 20px;
          text-align: center;
        "
      >
        <h2>Adventure World Theme Park</h2>

        <p>Manage your ride bookings online.</p>
      </div>

      <form id="registerForm">
        <input type="text" id="name" placeholder="Full Name" required />

        <input type="email" id="email" placeholder="Email Address" required />

        <input type="password" id="password" placeholder="Password" required />

        <button type="submit">Register</button>
      </form>

      <br />

      <p id="message" style="text-align: center; font-weight: bold"></p>

      <p style="text-align: center">
        Already have an account?

        <a href="/login.html"> Login Here </a>
      </p>
    </div>

    <footer>Theme Park Booking System © 2026</footer>

    <script src="js/register.js"></script>
    <script src="js/navigation.js"></script>
  </body>
</html>
